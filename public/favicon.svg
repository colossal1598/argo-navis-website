<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="half-cut">
      <rect x="0" y="0" width="512" height="484" />
    </clipPath>
    
    <g id="spoke">
      <line x1="256" y1="484" x2="448" y2="484" fill="none" />
      <circle cx="448" cy="484" r="36" />
    </g>
    
    <g id="helm">
      <!-- Outer Ring -->
      <circle cx="256" cy="484" r="168" fill="none" />
      
      <!-- Upper Half Spokes -->
      <use href="#spoke" />
      <use href="#spoke" transform="rotate(180 256 484)" />
      <use href="#spoke" transform="rotate(225 256 484)" />
      <use href="#spoke" transform="rotate(270 256 484)" />
      <use href="#spoke" transform="rotate(315 256 484)" />
      
      <!-- Inner Hub -->
      <circle cx="256" cy="484" r="72" />
    </g>
  </defs>

  <!-- Thick Outer Stroke Layer Restored (Width 56) -->
  <use href="#helm" stroke="#070c16" stroke-width="56" fill="#070c16" clip-path="url(#half-cut)" stroke-linejoin="round" stroke-linecap="round" />
  
  <!-- Flat Base Outline (Matches the 56px thickness and perfectly touches the 512px bottom boundary) -->
  <line x1="0" y1="484" x2="512" y2="484" stroke="#070c16" stroke-width="56" stroke-linecap="butt" />

  <!-- Core Thinner Blue Layer -->
  <use href="#helm" stroke="#5b8aff" stroke-width="24" fill="#5b8aff" clip-path="url(#half-cut)" stroke-linejoin="round" stroke-linecap="round" />
</svg>